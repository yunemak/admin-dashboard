<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Admin Dashboard</title>
	<!-- Links -->
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&family=Playpen+Sans:wght@100..800&family=Pliant:ital,wght@0,100..900;1,100..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="style.css">
</head>
<body>
	<div class="main-container">
		<div class="sidebar">
			<div>
				<img src="img/dashboard.svg" width="70px">
				<p>Dashboard</p>
			</div>
			<ul>
				<img class="icon" src="img/home.svg"><li><a>Home</a></li>
				<img class="icon" src="img/account.svg"><li><a>Profile</a></li>
				<img class="icon" src="img/messages.svg"><li><a>Messages</a></li>
				<img class="icon" src="img/history.svg"><li><a>History</a></li>
				<img class="icon" src="img/tasks.svg"><li><a>Tasks</a></li>
				<img class="icon" src="img/communities.svg"><li><a>Communities</a></li>
			</ul>
			<ul>
				<img class="icon" src="img/settings.svg"><li><a>Settings</a></li>
				<img class="icon" src="img/support.svg"><li><a>Support</a></li>
				<img class="icon" src="img/privacy.svg"><li><a>Privacy</a></li>
			</ul>
		</div>
		<div class="header">
			<div class="search-container">
				<img class="icon" src="img/search.svg">
				<input type="text">
			</div>
			<div class="account-part">
				<img class="icon" src="img/bell-ring.svg">
				<img class="admin-photo" src="img/admin-photo.jpg" width="60px">
				<p>Yunus Emre Ak</p>
			</div>
			<div class="greetings">
				<img class="admin-photo" src="img/admin-photo.jpg" width="80px">
				<div>
					<p>Hi there,</p>
					<p>Yunus Emre Ak (<a href="https://yunemak.github.io">@yunemak</a>)</p>
				</div>
			</div>
			<div class="buttons">
				<button type="button">New</button>
				<button type="button">Upload</button>
				<button type="button">Share</button>
			</div>
		</div>
		<div class="main-content">
			<h1>Projects</h1>
			<h1>Announcements</h1>
			<div class="projects">
				<div class="card"></div>
				<div class="card"></div>
				<div class="card"></div>
				<div class="card"></div>
				<div class="card"></div>
				<div class="card"></div>
			</div>
			<div class="right-side-panel">
				<div class="panel"></div>
				<div class="panel"></div>
			</div>
		</div>


	</div>
</body>
</html>
